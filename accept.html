<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accept Policies</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff4d4d">
<style>
body{
font-family:Arial;
padding:20px;
text-align:center;
}
button{
padding:12px 20px;
background:green;
color:white;
border:none;
border-radius:8px;
}
a{
display:block;
margin:10px;
}
</style>
</head>
<body>

<h2>Welcome 👋</h2>

<p>Please read and accept before continuing.</p>

<a href="privacy.html">Privacy Policy</a>
<a href="Terms.html">Terms & Conditions</a>
<a href="refund.html">Refund & Cancellation Policy</a>

<br>

<button onclick="acceptPolicies()">
Accept & Continue
</button>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  doc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",
  authDomain:"food-delivery-app-97300.firebaseapp.com",
  projectId:"food-delivery-app-97300"
});

const db = getFirestore(app);
const auth = getAuth(app);

window.acceptPolicies = async () => {

  try {

    const user = auth.currentUser;

    if(!user){
      alert("Please login again");
      location.href = "login.html";
      return;
    }

    await updateDoc(
      doc(db,"users",user.uid),
      {
        policyAccepted:true
      }
    );

    alert("Policies accepted");
    location.href = "details.html";

  } catch(err) {

    alert(err.message);

  }

};

</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
</body>
</html>
