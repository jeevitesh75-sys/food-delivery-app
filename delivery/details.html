<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Delivery Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff4d4d">
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
}
.header{
  background:#ff4d4d;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}
.container{
  max-width:500px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}
input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}
button{
  width:100%;
  padding:12px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="header">Delivery Partner Details</div>

<div class="container">

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">

<input id="address" placeholder="Address (Optional)">

<select id="vehicle">
  <option value="">Vehicle Type (Optional)</option>
  <option>Bike</option>
  <option>Scooter</option>
  <option>Bicycle</option>
  <option>Car</option>
</select>

<input id="photo" placeholder="Profile Photo URL (Optional)">

<button onclick="saveDetails()">Continue</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",
  authDomain:"food-delivery-app-97300.firebaseapp.com",
  projectId:"food-delivery-app-97300"
});

const db = getFirestore(app);
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const auth = getAuth(app);

let user = null;

onAuthStateChanged(auth, async(currentUser)=>{

  if(!currentUser){
    location.href = "login.html";
    return;
  }

  user = currentUser;

  const existing = await getDoc(
    doc(db,"deliveryPartners",user.uid)
  );

  if(existing.exists()){
    location.href = "home.html";
  }

});

window.saveDetails = async ()=>{

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();

  if(name.length < 3){
    alert("Enter valid name");
    return;
  }

  if(phone.length !== 10){
    alert("Enter valid phone number");
    return;
  }

  await setDoc(doc(db,"deliveryPartners",user.uid),{
    uid:user.uid,
    email:user.email,
    name,
    phone,
    address:document.getElementById("address").value,
    vehicle:document.getElementById("vehicle").value,
    photo:document.getElementById("photo").value,
    online:false,
    earnings:0,
    createdAt:Date.now()
  });

  location.href="home.html";
};

</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
</body>
</html>
