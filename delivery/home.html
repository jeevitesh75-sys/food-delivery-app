<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Delivery Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff4d4d">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:80px;
}

.header{
background:#ff4d4d;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.top-card{
background:white;
margin:10px;
padding:15px;
border-radius:12px;
}

.order-card{
background:white;
margin:10px;
padding:15px;

.red{

}

</head>

<body>

<div class="header">
🚴 Delivery Partner
</div>

<div class="top-card">

<h3 id="boyName">Loading...</h3>

<br>

Status :
<span id="statusText" class="offline">
Offline
</span>

<br><br>

<button
id="toggleBtn"
class="green"
onclick="toggleOnline()">
Go Online
</button>

<br><br>

Today Earnings :
₹<span id="todayEarn">0</span>

<br><br>



<br><br>

Total Earnings :
₹<span id="totalEarn">0</span>

<br><br>



</div>

<div class="top-card">
<h3>Available Orders</h3>
<div id="orders"></div>
</div>

<div class="bottom-nav">
<a href="home.html">🏠 Home</a>
<a href="Profile.html">👤 Profile</a>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
onSnapshot,
doc,
updateDoc,
getDoc,
deleteDoc,
increment
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
const app = initializeApp({
apiKey:"AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",
authDomain:"food-delivery-app-97300.firebaseapp.com",
projectId:"food-delivery-app-97300"
});

const db = getFirestore(app);
const auth = getAuth(app);
onAuthStateChanged(auth, async (user)=>{

  if(!user){
    location.href = "login.html";
    return;
  }

  const profileRef =
  doc(db,"deliveryPartners",user.uid);

  const profileSnap =
  await getDoc(profileRef);

  if(!profileSnap.exists()){
    location.href = "details.html";
    return;
  }

  const profile = profileSnap.data();

  // Put all your remaining code here
  navigator.geolocation.watchPosition(
async(position)=>{

  await updateDoc(
    doc(db,"deliveryPartners",user.uid),
    {
      liveLat: position.coords.latitude,
      liveLng: position.coords.longitude,
      updatedAt: Date.now()
    }
  );

},
(err)=>{
  console.log(err);
},
{
  enableHighAccuracy:true
});

const profile = profileSnap.data();
onSnapshot(profileRef,(snap)=>{

  const data = snap.data();

  document.getElementById("todayEarn").innerText =
  data.todayEarn || 0;

  document.getElementById("totalEarn").innerText =
  data.totalEarn || 0;

});
document.getElementById("boyName")
.innerText = "👋 " + profile.name;

document.getElementById("todayEarn")
.innerText =
profile.todayEarn || 0;

document.getElementById("totalEarn")
.innerText =
profile.totalEarn || 0;


let online = profile.online || false;

updateStatus();

function updateStatus(){

document.getElementById("statusText")
.innerText =
online ? "Online" : "Offline";

document.getElementById("statusText")
.className =
online ? "online" : "offline";

document.getElementById("toggleBtn")
.innerText =
online ? "Go Offline" : "Go Online";
}

window.toggleOnline = async()=>{

online = !online;

await updateDoc(
profileRef,
{
online:online
}
);

updateStatus();
};
function getDistance(lat1, lon1, lat2, lon2){

  const R = 6371;

  const dLat =
  (lat2-lat1) * Math.PI/180;

  const dLon =
  (lon2-lon1) * Math.PI/180;

  const a =
  Math.sin(dLat/2) *
  Math.sin(dLat/2) +

  Math.cos(lat1*Math.PI/180) *
  Math.cos(lat2*Math.PI/180) *

  Math.sin(dLon/2) *
  Math.sin(dLon/2);

  const c =
  2 * Math.atan2(
    Math.sqrt(a),
    Math.sqrt(1-a)
  );

  return (R*c).toFixed(1);
}
const orderQuery = query(
  collection(db,"orders"),
  where("status","in",["Ready","Out for Delivery"])
);
onSnapshot(orderQuery,(snap)=>{

let html = "";

snap.forEach(docSnap=>{

let order = docSnap.data();
let distance = "-";

if(
  order.restaurantLat &&
  order.restaurantLng &&
  order.customerLat &&
  order.customerLng
){
  distance = getDistance(
    order.restaurantLat,
    order.restaurantLng,
    order.customerLat,
    order.customerLng
  ) + " km";
}
let km = parseFloat(distance) || 0;

let deliveryEarning = order.deliveryFee || 30;

if(
  order.status === "Out for Delivery" &&
  order.deliveryBoyId !== user.uid
){
  return;
}

html += `

<div class="order-card">

<b>🏪 Restaurant:</b>
${order.restaurantName || "-"}

<br><br>

<b>📞 Restaurant Phone:</b>
${order.restaurantPhone || "-"}

<br><br>

<b>📍 Restaurant Address:</b>
${order.restaurantAddress || "-"}

<br><br>

${order.restaurantLat && order.restaurantLng ? `
<a target="_blank"
href="https://www.google.com/maps?q=${order.restaurantLat},${order.restaurantLng}">
<button class="orange">
🏪 Open Restaurant
</button>
</a>
` : ""}

<br><br>

<b>Customer:</b>
${order.customerName || "-"}

<br><br>

<b>Phone:</b>
${order.customerPhone || "-"}

<br><br>

<b>Address:</b>
${order.customerAddress || "-"}

<br><br>

<a href="tel:${order.customerPhone || ''}">
<button class="green">
📞 Call Customer
</button>
</a>

<br><br>

${order.customerLat && order.customerLng ? `
<a target="_blank"
href="https://www.google.com/maps?q=${order.customerLat},${order.customerLng}">
<button class="orange">
🗺 Open Map
</button>
</a>
` : `
<p>Location not available</p>
`}

<br><br>

<b>Total:</b>
₹${order.total || 0}
<br><br>

<b>Distance:</b>
${distance}

<br><br>

<b>Your Earning:</b>
₹${deliveryEarning}

<br><br>

<b>Status:</b>
${order.status}

<br><br>

${
order.deliveryBoyId === user.uid
? (
order.pickedUp
? `
<button
class="orange"
onclick="deliverOrder('${docSnap.id}',${deliveryEarning})">
Delivered
</button>
`
: `
<button
class="green"
onclick="pickupOrder('${docSnap.id}')">
Picked Up
</button>
`
)
: `
<button
class="green"
onclick="acceptOrder('${docSnap.id}')">
Accept Order
</button>
`
}

</div>

`;

});

if(html===""){
html="<p>No orders available</p>";
}

document.getElementById("orders")
.innerHTML = html;

});


window.acceptOrder = async(id)=>{

  const orderRef = doc(db,"orders",id);

  const snap = await getDoc(orderRef);

  if(!snap.exists()){
    return;
  }

  const order = snap.data();

  if(order.deliveryBoyId){
    alert("Already accepted by another rider");
    return;
  }

  await updateDoc(
    orderRef,
    {
      deliveryBoyId:user.uid,
      deliveryBoyName:profile.name,
      deliveryBoyPhone:profile.phone,
      deliveryBoyLat:profile.liveLat || null,
      deliveryBoyLng:profile.liveLng || null,
      status:"Out for Delivery"
    }
  );

  alert("Order Accepted Successfully");
};
window.pickupOrder = async(id)=>{

  await updateDoc(
    doc(db,"orders",id),
    {
      pickedUp:true
    }
  );

  alert("Food Picked Up ✅");

};
window.deliverOrder = async(id,fee)=>{

  // Get order details first
  const orderRef = doc(db,"orders",id);
  const orderSnap = await getDoc(orderRef);

  if(!orderSnap.exists()){
    alert("Order not found");
    return;
  }

  const order = orderSnap.data();

  // Mark order delivered
  await updateDoc(
    orderRef,
    {
      status:"Delivered",
      deliveredAt:Date.now()
    }
  );

  // Delivery boy earnings
  // Delivery boy earnings + cash collected
await updateDoc(
  profileRef,
  {
    todayEarn: increment(fee),
    totalEarn: increment(fee),

    // Money collected from customer
    todayCollection: increment(
      Number(order.total || 0)
    )
  }
);

  // Restaurant earnings
  

  if(order.restaurantId){

  await updateDoc(
    doc(db,"restaurants",order.restaurantId),
    {
      todayEarn: increment(Number(order.subtotal || 0)),
      totalEarn: increment(Number(order.subtotal || 0))
    }
  );

}

console.log("Delivery Fee =", fee);
alert("Fee = " + fee);

const fresh = await getDoc(profileRef);
const data = fresh.data();

document.getElementById("todayEarn").innerText =
data.todayEarn || 0;

document.getElementById("totalEarn").innerText =
data.totalEarn || 0;

alert("Order Delivered ✅");
};
});


</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
</body>
</html>
