<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Delivery Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/delivery/manifest.json">
<meta name="theme-color" content="#ff4d4d">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ background:#f5f5f5; padding-bottom:80px; }
.header{ background:#ff4d4d; color:white; padding:15px; text-align:center; font-size:22px; font-weight:bold; }
.top-card{ background:white; margin:10px; padding:15px; border-radius:12px; }
.order-card{ background:white; margin:10px; padding:15px; border-radius:12px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
button{ padding:10px; border:none; border-radius:8px; color:white; cursor:pointer; margin-top:8px; }
.green  { background:#28a745; }
.red    { background:#dc3545; }
.orange { background:#ff9800; }
.bottom-nav{ position:fixed; bottom:0; left:0; width:100%; background:white; display:flex; justify-content:space-around; padding:12px; border-top:1px solid #ccc; }
.bottom-nav a{ text-decoration:none; color:black; font-weight:bold; }
.online  { color:green; font-weight:bold; }
.offline { color:red;   font-weight:bold; }

/* ── NOTIFICATION BANNER ── */
#notif-banner {
  display:none;
  position:fixed;
  top:10px; left:10px; right:10px;
  background:#28a745;
  color:white;
  padding:14px 16px;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  z-index:9999;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  animation: slide-in 0.35s ease;
  cursor:pointer;
}
@keyframes slide-in {
  from { transform:translateY(-16px); opacity:0; }
  to   { transform:translateY(0);     opacity:1; }
}

/* ── NOTIF PERMISSION PROMPT ── */
#notif-prompt {
  background:#fff3cd;
  border:1px solid #ffc107;
  border-radius:10px;
  padding:12px 14px;
  margin:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  font-size:13px;
}
</style>
</head>

<body>

<!-- ── NOTIFICATION BANNER ── -->
<div id="notif-banner" onclick="this.style.display='none'">
  🔔 <span id="notif-text">New delivery available!</span>
</div>

<div class="header">🚴 Delivery Partner</div>

<!-- ── NOTIFICATION PERMISSION PROMPT ── -->
<div id="notif-prompt">
  <span>🔔 Enable notifications to get new delivery alerts!</span>
  <button class="green" style="padding:7px 12px;margin:0;" onclick="enableNotifications()">Enable</button>
</div>

<div class="top-card">
  <h3 id="boyName">Loading...</h3><br>
  Status: <span id="statusText" class="offline">Offline</span><br><br>
  <button id="toggleBtn" class="green" onclick="toggleOnline()">Go Online</button><br><br>
  Today Earnings: ₹<span id="todayEarn">0</span><br><br>
  Total Earnings: ₹<span id="totalEarn">0</span>
</div>

<div class="top-card">
  <h3>Available Orders</h3>
  <div id="orders"></div>
</div>

<div class="bottom-nav">
  <a href="home.html">🏠 Home</a>
  <a href="Profile.html">👤 Profile</a>
</div>

<!-- ══ FIREBASE + LOGIC (ALL ORIGINAL UNTOUCHED) ══ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, query, where,
  onSnapshot, doc, updateDoc, getDoc, deleteDoc, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey:    "AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",
  authDomain:"food-delivery-app-97300.firebaseapp.com",
  projectId: "food-delivery-app-97300"
});
const db   = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) { location.href = "login.html"; return; }

  const profileRef  = doc(db, "deliveryPartners", user.uid);
  const profileSnap = await getDoc(profileRef);
  if (!profileSnap.exists()) { location.href = "details.html"; return; }

  const profile = profileSnap.data();

  // ── LIVE LOCATION UPDATE (original) ──
  navigator.geolocation.watchPosition(
    async (position) => {
      await updateDoc(profileRef, {
        liveLat:   position.coords.latitude,
        liveLng:   position.coords.longitude,
        updatedAt: Date.now()
      });
    },
    (err) => console.log(err),
    { enableHighAccuracy: true }
  );

  // ── EARNINGS LIVE (original) ──
  onSnapshot(profileRef, (snap) => {
    const data = snap.data();
    document.getElementById("todayEarn").innerText = data.todayEarn || 0;
    document.getElementById("totalEarn").innerText = data.totalEarn || 0;
  });

  document.getElementById("boyName").innerText   = "👋 " + profile.name;
  document.getElementById("todayEarn").innerText = profile.todayEarn || 0;
  document.getElementById("totalEarn").innerText = profile.totalEarn || 0;

  let online = profile.online || false;

  function updateStatus() {
    document.getElementById("statusText").innerText = online ? "Online" : "Offline";
    document.getElementById("statusText").className = online ? "online" : "offline";
    document.getElementById("toggleBtn").innerText  = online ? "Go Offline" : "Go Online";
  }
  updateStatus();

  window.toggleOnline = async () => {
    online = !online;
    await updateDoc(profileRef, { online });
    updateStatus();
  };

  // ── DISTANCE HELPER (original) ──
  function getDistance(lat1, lon1, lat2, lon2) {
    const R    = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a    = Math.sin(dLat/2)*Math.sin(dLat/2) +
                 Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
                 Math.sin(dLon/2)*Math.sin(dLon/2);
    return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
  }

  // ── ORDERS LISTENER (original) ──
  // "Accepted" = restaurant accepted, broadcast to all riders to grab
  const orderQuery = query(collection(db,"orders"), where("status","in",["Accepted","Out for Delivery"]));
  onSnapshot(orderQuery, (snap) => {
    let html = "";
    snap.forEach(docSnap => {
      const order = docSnap.data();
      let distance = "-";
      if (order.restaurantLat && order.restaurantLng && order.customerLat && order.customerLng) {
        distance = getDistance(order.restaurantLat, order.restaurantLng, order.customerLat, order.customerLng) + " km";
      }
      const deliveryEarning = order.deliveryFee || 30;

      // Hide "Out for Delivery" orders that belong to someone else
      if (order.status === "Out for Delivery" && order.deliveryBoyId !== user.uid) return;
      // Hide "Accepted" orders already taken by someone else
      if (order.status === "Accepted" && order.deliveryBoyId && order.deliveryBoyId !== user.uid) return;

      html += `
        <div class="order-card">
          <b>🏪 Restaurant:</b> ${order.restaurantName||"-"}<br><br>
          <b>📞 Restaurant Phone:</b> ${order.restaurantPhone||"-"}<br><br>
          <b>📍 Restaurant Address:</b> ${order.restaurantAddress||"-"}<br><br>
          ${order.restaurantLat && order.restaurantLng ? `
            <a target="_blank" href="https://www.google.com/maps?q=${order.restaurantLat},${order.restaurantLng}">
              <button class="orange">🏪 Open Restaurant</button>
            </a>` : ""}
          <br><br>
          <b>Customer:</b> ${order.customerName||"-"}<br><br>
          <b>Phone:</b> ${order.customerPhone||"-"}<br><br>
          <b>Address:</b> ${order.customerAddress||"-"}<br><br>
          <a href="tel:${order.customerPhone||''}"><button class="green">📞 Call Customer</button></a><br><br>
          ${order.customerLat && order.customerLng ? `
            <a target="_blank" href="https://www.google.com/maps?q=${order.customerLat},${order.customerLng}">
              <button class="orange">🗺 Open Map</button>
            </a>` : `<p>Location not available</p>`}
          <br><br>
          <b>Total:</b> ₹${order.total||0}<br><br>
          <b>Distance:</b> ${distance}<br><br>
          <b>Your Earning:</b> ₹${deliveryEarning}<br><br>
          <b>Status:</b> ${order.status}<br><br>
          ${
            // If I already accepted this order
            order.deliveryBoyId === user.uid
              ? (order.pickedUp
                  ? `<button class="orange" onclick="deliverOrder('${docSnap.id}',${deliveryEarning})">✅ Delivered</button>`
                  : `<button class="green"  onclick="pickupOrder('${docSnap.id}')">📦 Picked Up from Restaurant</button>`)
              // If no one has accepted yet - show Accept button
              : (!order.deliveryBoyId
                  ? `<button class="green" onclick="acceptOrder('${docSnap.id}')">🛵 Accept Order</button>`
                  // Already taken by someone else - hide
                  : `<p style="color:#999;font-size:12px;">Accepted by another rider</p>`)
          }
        </div>`;
    });
    document.getElementById("orders").innerHTML = html || "<p>No orders available</p>";
  });

  // ── ORDER ACTIONS (original) ──
  window.acceptOrder = async (id) => {
    const orderRef  = doc(db,"orders",id);
    const snap      = await getDoc(orderRef);
    if (!snap.exists()) return;
    const order     = snap.data();

    // Race condition check — someone else may have grabbed it
    if (order.deliveryBoyId) {
      alert("❌ Another rider already accepted this order!");
      return;
    }

    const fresh = await getDoc(profileRef);
    const rider = fresh.data();

    // Assign to this delivery boy — disappears for all others instantly
    await updateDoc(orderRef, {
      deliveryBoyId:    user.uid,
      deliveryBoyName:  rider.name    || "",
      deliveryBoyPhone: rider.phone   || "",
      deliveryBoyLat:   rider.liveLat || null,
      deliveryBoyLng:   rider.liveLng || null,
      status:           "Out for Delivery",
      pickedUp:         false
    });

    alert("✅ Order Accepted! Go pick it up from the restaurant.");
  };

  window.pickupOrder = async (id) => {
    await updateDoc(doc(db,"orders",id), { pickedUp: true });
    alert("Food Picked Up ✅");
  };

  window.deliverOrder = async (id, fee) => {
    const orderRef  = doc(db,"orders",id);
    const orderSnap = await getDoc(orderRef);
    if (!orderSnap.exists()) { alert("Order not found"); return; }
    const order     = orderSnap.data();

    await updateDoc(orderRef, { status:"Delivered", deliveredAt: Date.now() });
    await updateDoc(profileRef, {
      todayEarn:       increment(fee),
      totalEarn:       increment(fee),
      todayCollection: increment(Number(order.total || 0))
    });
    if (order.restaurantId) {
      await updateDoc(doc(db,"restaurants",order.restaurantId), {
        todayEarn: increment(Number(order.subtotal || 0)),
        totalEarn: increment(Number(order.subtotal || 0))
      });
    }
    console.log("Delivery Fee =", fee);
    const fresh = await getDoc(profileRef);
    const data  = fresh.data();
    document.getElementById("todayEarn").innerText = data.todayEarn || 0;
    document.getElementById("totalEarn").innerText = data.totalEarn || 0;
    alert("Order Delivered ✅");
  };

  // ══════════════════════════════════════════
  // WEBPUSHR — Save subscriber ID to Firestore
  // so restaurant dashboard can notify this boy
  // ══════════════════════════════════════════
  window.enableNotifications = async () => {
    try {
      if (!("Notification" in window)) {
        alert("Notifications not supported on this browser"); return;
      }
      const perm = await Notification.requestPermission();
      if (perm !== "granted") {
        alert("Please allow notifications to receive delivery alerts!"); return;
      }

      // Webpushr handles subscription — we just need to grab the subscriber ID
      // and save it to Firestore so restaurant can push directly to this device
      if (typeof webpushr === "undefined") {
        alert("Webpushr not loaded yet, try again in a moment"); return;
      }

      webpushr("subscribe", {});

      // Wait 2 seconds then get subscriber ID
      setTimeout(() => {
        webpushr("getAttribute", {}, async (sub) => {
          if (sub && sub.sid) {
            await updateDoc(profileRef, {
              webpushrSubId:        sub.sid,
              notificationsEnabled: true
            });
            document.getElementById("notif-prompt").style.display = "none";
            showBanner("✅ Notifications enabled! You'll get new delivery alerts.");
          }
        });
      }, 2000);

    } catch(e) {
      console.log("Notification setup error:", e);
    }
  };

  // Auto hide prompt if already subscribed
  if (profile.webpushrSubId || Notification.permission === "granted") {
    document.getElementById("notif-prompt").style.display = "none";
  }

  // ── BANNER HELPER ──
  window.showBanner = (msg, color) => {
    const b = document.getElementById("notif-banner");
    b.style.background = color === "orange" ? "#ff9800" : "#28a745";
    document.getElementById("notif-text").innerText = msg;
    b.style.display = "block";
    setTimeout(() => b.style.display = "none", 5000);
  };

});
</script>

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/delivery/sw.js", { scope:"/delivery/" });
