<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Delivery Login</title>

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<link
rel="manifest"
href="/delivery/manifest.json">

<meta
name="theme-color"
content="#ff4d4d">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:none;
min-height:100vh;
justify-content:center;
align-items:center;
padding:20px;

background:
linear-gradient(
180deg,
#ff4d4d,
#ff884d
);
}

.card{
width:100%;
max-width:380px;

background:white;

padding:35px;

border-radius:24px;

text-align:center;

box-shadow:
0 20px 50px
rgba(0,0,0,.15);
}

.logo{

width:100px;
height:100px;

margin:auto;

border-radius:50%;

background:#fff3ec;

display:flex;

align-items:center;

justify-content:center;

font-size:48px;

margin-bottom:20px;

}

.title{

font-size:28px;

font-weight:bold;

}

.sub{

margin-top:10px;

color:#777;

line-height:24px;

}

.google-btn{

margin-top:30px;

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:#4285F4;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}

.footer{

margin-top:18px;

font-size:12px;

color:#999;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
🛵
</div>

<div class="title">
Delivery Partner
</div>

<div class="sub">
Sign in and start<br>
delivering orders
</div>

<button
id="loginBtn"
class="google-btn">

🔵 Continue with Google

</button>

<div class="footer">
Powered by Eluru Foods
</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
setPersistence,
browserLocalPersistence,
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getMessaging,
getToken
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig={

apiKey:
"AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",

authDomain:
"food-delivery-app-97300.firebaseapp.com",

projectId:
"food-delivery-app-97300",

storageBucket:
"food-delivery-app-97300.firebasestorage.app",

messagingSenderId:
"12744604798",

appId:
"1:12744604798:web:4417d6d7f97b9b7218ec2f"

};

const app=
initializeApp(
firebaseConfig
);

const auth=
getAuth(app);

const db=
getFirestore(app);

await setPersistence(
auth,
browserLocalPersistence
);

let messaging=null;

try{

messaging=
getMessaging(
app
);

}catch(e){

console.log(
"FCM disabled",
e
);

}

onAuthStateChanged(
auth,
async(user)=>{

if(!user){
document.body.style.display="flex";
return;
}

const snap =
await getDoc(
doc(
db,
"deliveryPartners",
user.uid
)
);

if(
snap.exists()
&&
snap.data()?.name
){
location.href="home.html";
}else{
location.href="details.html";
}

}
);

document
.getElementById(
"loginBtn"
)
.onclick=
async()=>{

try{

const provider=
new GoogleAuthProvider();

const result=
await signInWithPopup(
auth,
provider
);

const user = result.user;

// ask notification
try{

if(Notification.permission!=="granted"){
await Notification.requestPermission();
}

if(
messaging &&
Notification.permission==="granted"
){

const sw =
await navigator.serviceWorker.register(
"/delivery/firebase-messaging-sw.js"
);

const token =
await getToken(
messaging,
{
vapidKey:
"BPsWJDECHCc-VL9rGtkOSIizHTDdEQ4fDaWn14J-_wbHSNbzCmE5gK-Z4Rbq_qGC-VddcIEpp5yk8TuoQkiEVvM",
serviceWorkerRegistration:sw
}
);

alert(
token
?
"FCM SAVED"
:
"FCM EMPTY"
);

/* FCM SAVE (DISABLED)

if(token){

await setDoc(
doc(
db,
"deliveryPartners",
user.uid
),
{
fcmToken:token
},
{
merge:true
}
);

}

*/
}

}catch(e){

alert(
"FCM ERROR\n"+
e.message
);

}

localStorage.setItem(
"deliveryUser",
JSON.stringify({
uid:user.uid,
name:user.displayName,
email:user.email,
photo:user.photoURL
})
);

// redirect
const snap=
await getDoc(
doc(
db,
"deliveryPartners",
user.uid
)
);

if(
snap.exists()
&&
snap.data()?.name
){

location.href=
"home.html";

}else{

location.href=
"details.html";

  }


}catch(err){

console.log(
err
);

alert(
err.message
);

}

};

document.body.style.display=
"flex";

</script>

<script>

if(
"serviceWorker"
in navigator
){

navigator.serviceWorker.register(
"/delivery/sw.js",
{
scope:
"/delivery/"
});

}

</script>

</body>

</html>
