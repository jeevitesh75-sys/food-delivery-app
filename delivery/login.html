<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Delivery Login</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<link rel="manifest"
href="/manifest.json">

<meta name="theme-color"
content="#ff4d4d">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

background:
linear-gradient(
180deg,
#ff4d4d,
#ff884d
);

}

.card{

width:100%;
max-width:380px;

background:white;

padding:35px;

border-radius:24px;

text-align:center;

box-shadow:
0 20px 50px
rgba(0,0,0,.15);

}

.logo{

width:100px;
height:100px;

margin:auto;

border-radius:50%;

background:#fff3ec;

display:flex;

align-items:center;

justify-content:center;

font-size:48px;

margin-bottom:20px;

}

.title{

font-size:28px;

font-weight:bold;

color:#222;

}

.sub{

margin-top:10px;

color:#777;

line-height:24px;

}

.google-btn{

margin-top:30px;

width:100%;

padding:15px;

border:none;

border-radius:14px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:#4285F4;

color:white;

}

.footer{

margin-top:18px;

font-size:12px;

color:#999;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
🛵
</div>

<div class="title">
Delivery Partner
</div>

<div class="sub">

Sign in and start<br>

delivering orders

</div>

<button
id="loginBtn"
class="google-btn">

🔵 Continue with Google

</button>

<div class="footer">

Powered by Eluru Foods

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
getDoc

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {

getAuth,
GoogleAuthProvider,
signInWithRedirect,
getRedirectResult

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={

apiKey:
"AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",

authDomain:
"food-delivery-app-97300.firebaseapp.com",

projectId:
"food-delivery-app-97300"

};

const app=
initializeApp(firebaseConfig);

const auth=
getAuth(app);

const db=
getFirestore(app);

const provider=
new GoogleAuthProvider();

document
.getElementById(
"loginBtn"
)

.addEventListener(

"click",

async()=>{

try{

await signInWithRedirect(
auth,
provider
);

}
catch(err){

alert(
err.message
);

}

}

);

getRedirectResult(
auth
)

.then(

async(result)=>{

if(!result)
return;

const user=
result.user;

localStorage.setItem(

"deliveryUser",

JSON.stringify({

uid:
user.uid,

name:
user.displayName,

email:
user.email,

photo:
user.photoURL

})

);

const snap=
await getDoc(

doc(
db,
"deliveryPartners",
user.uid
)

);

if(
snap.exists()
){

location.href=
"home.html";

}else{

location.href=
"details.html";

}

}

)

.catch(

(err)=>{

alert(
err.message
);

}

);

</script>

<script>

if(
"serviceWorker"
in navigator
){

navigator
.serviceWorker
.register(
"/sw.js"
);

}

</script>

</body>
</html>
