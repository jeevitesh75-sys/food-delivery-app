<body>
  <div class="sidebar">

<h2>Admin</h2>

<div class="main">

<!-- existing page content here -->



<div class="header">
⚙️ App Settings
</div>

<div class="card">

<h3>Food Pricing</h3>

<label>Food Markup (%)</label>
<input id="foodMarkup">

<label>Platform Fee (₹)</label>
<input id="platformFee">

</div>

<div class="card">

<h3>Delivery Fees</h3>

<label>0 - 3 KM</label>
<input id="fee0to3">

<label>3 - 7 KM</label>
<input id="fee3to7">

<label>7 - 10 KM</label>
<input id="fee7to10">

<label>10+ KM</label>
<input id="fee10plus">

</div>

<div class="card">

<button onclick="saveSettings()">
Save Settings
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
getAuth,
onAuthStateChanged,
signOut
}
const app = initializeApp({
apiKey:"AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",
authDomain:"food-delivery-app-97300.firebaseapp.com",
projectId:"food-delivery-app-97300"
});

const db = getFirestore(app);
const auth = getAuth(app);
const settingsRef =
doc(db,"settings","appConfig");

async function loadSettings(){

  const snap =
  await getDoc(settingsRef);

  if(!snap.exists()){

    await setDoc(settingsRef,{
  foodMarkup:20,
  platformFee:3,

  fee0to3:30,
  fee3to7:50,
  fee7to10:70,
  fee10plus:100,

  todayProfitReset:0
});

    return loadSettings();
  }

  const data = snap.data();

  document.getElementById("foodMarkup").value =
  data.foodMarkup || 20;

  document.getElementById("platformFee").value =
  data.platformFee || 3;

  document.getElementById("fee0to3").value =
  data.fee0to3 || 30;

  document.getElementById("fee3to7").value =
  data.fee3to7 || 50;

  document.getElementById("fee7to10").value =
  data.fee7to10 || 70;

  document.getElementById("fee10plus").value =
  data.fee10plus || 100;
}

window.saveSettings = async()=>{

  await setDoc(settingsRef,{

    foodMarkup:Number(
      document.getElementById("foodMarkup").value
    ),

    platformFee:Number(
      document.getElementById("platformFee").value
    ),

    fee0to3:Number(
      document.getElementById("fee0to3").value
    ),

    fee3to7:Number(
      document.getElementById("fee3to7").value
    ),

    fee7to10:Number(
      document.getElementById("fee7to10").value
    ),

    fee10plus:Number(
      document.getElementById("fee10plus").value
    )

  });

  alert("Settings Saved ✅");
};
document.getElementById("logoutBtn")
.onclick = async()=>{

  await signOut(auth);

  location.href = "login.html";

};
onAuthStateChanged(auth,(user)=>{

  if(!user){
    location.href = "login.html";
    return;
  }

  loadSettings();

});

</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
</body>
