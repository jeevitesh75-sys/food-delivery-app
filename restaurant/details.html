<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Restaurant Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff4d4d">
<style>
body {
  font-family: Arial;
  padding: 20px;
  background:#f5f5f5;
}

.container {
  max-width: 400px;
  margin: auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2 { text-align:center; }

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

button {
  padding:12px;
  width:100%;
  border:none;
  border-radius:5px;
  margin-top:10px;
  cursor:pointer;
}

.location-btn { background:#2196F3; color:white; }
.save-btn { background:#4CAF50; color:white; }
</style>

</head>

<body>

<div class="container">

<h2>🏪 Restaurant Details</h2>

<input id="owner" placeholder="Owner Name">
<input id="name" placeholder="Restaurant Name">

<!-- ✅ ADDED PHONE -->
<input id="phone" placeholder="Phone Number">

<input id="image" placeholder="Image URL">
<input id="location" placeholder="Address will appear here">

<button class="location-btn" onclick="getLocation()">📍 Use Live Location</button>
<button class="save-btn" onclick="saveDetails()">Save</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
// FIREBASE
const app = initializeApp({
  apiKey: "AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",
  authDomain: "food-delivery-app-97300.firebaseapp.com",
  projectId: "food-delivery-app-97300"
});

const db = getFirestore(app);
const auth = getAuth(app);
// USER
onAuthStateChanged(auth, (user) => {

if(!user){
  location.href = "login.html";
  return;
}

// LOCATION
let lat = null;
let lng = null;

// GET LOCATION
window.getLocation = function(){

  navigator.geolocation.getCurrentPosition(async (pos)=>{

    lat = pos.coords.latitude;
    lng = pos.coords.longitude;

    try {
      let res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`
      );

      let data = await res.json();

      document.getElementById("location").value = data.display_name;

    } catch(err){
      alert("Failed to get address ❌");
    }

  }, ()=>{
    alert("Allow location ❌");
  });

};

// SAVE
window.saveDetails = async function(){

  let ownerName = document.getElementById("owner").value;
  let restaurantName = document.getElementById("name").value;
  let phone = document.getElementById("phone").value; // ✅ added
  let imageUrl = document.getElementById("image").value;
  let address = document.getElementById("location").value;

  if(!ownerName || !restaurantName || !address || !phone){
    alert("Fill all details ❌");
    return;
  }

  if(!lat || !lng){
    alert("Please use live location ❌");
    return;
  }

  try {

  await setDoc(doc(db, "restaurants", user.uid), {
  owner: ownerName,
  name: restaurantName,
  phone: phone,
  image: imageUrl,
  address: address,
  lat: lat,
  lng: lng,
  email: user.email,

  fcmToken:
  localStorage.getItem("restaurantFCMToken") || "",

  todayEarn: 0,
  totalEarn: 0,
  isOpen: true,

  createdAt: new Date()
});
    alert("Saved successfully ✅");

    window.location.href = "Dashboard.html";

  } catch(err){
    console.log(err);
    alert("Error: " + err.message);
  }

};
});
</script>

</body>
</html>
