<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Restaurant Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/restaurant/manifest.json">
<meta name="theme-color" content="#ff4d4d">
<style>
body { font-family:Arial; background:#f5f5f5; margin:0; padding-bottom:80px; }
.header {
  background:#ff4d4d; color:white; padding:15px;
  text-align:center; font-size:18px; font-weight:bold;
  position:sticky; top:0; z-index:100;
}
.container { max-width:700px; margin:auto; }
.card { background:white; margin:10px; padding:15px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
input { width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; }
button { padding:8px 12px; border:none; border-radius:6px; color:white; margin:4px; cursor:pointer; font-size:13px; }
.green  { background:#28a745; }
.red    { background:#dc3545; }
.orange { background:#ff9800; }
.blue   { background:#007bff; }
.food-item { display:flex; align-items:center; justify-content:space-between; margin:10px 0; padding:8px 0; border-bottom:1px solid #f0f0f0; }
.food-left { display:flex; align-items:center; gap:10px; }
.food-img  { width:50px; height:50px; border-radius:8px; object-fit:cover; }
.order-box { border-bottom:1px solid #eee; padding:14px 0; animation:order-pop 0.4s ease; }
@keyframes order-pop { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.bottom-nav { position:fixed; bottom:0; left:0; width:100%; background:white; display:flex; justify-content:center; padding:10px 0; border-top:1px solid #ccc; }
.earn-box   { display:flex; justify-content:space-between; align-items:center; margin:8px 0; }
.food-scroll{ max-height:420px; overflow-y:auto; padding-right:6px; }
.food-scroll::-webkit-scrollbar { width:6px; }
.food-scroll::-webkit-scrollbar-thumb { background:#ff4d4d; border-radius:10px; }
.sbadge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:bold; }
.s-pending  { background:#fff3cd; color:#856404; }
.s-accepted { background:#cce5ff; color:#004085; }
.s-ready    { background:#d1e7dd; color:#0a3622; }
.s-out-for-delivery { background:#e2d9f3; color:#4a235a; }
#notif-banner {
  display:none; position:fixed; top:65px; left:10px; right:10px;
  color:white; padding:14px 16px; border-radius:12px;
  font-size:14px; font-weight:bold; z-index:9999;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  animation:slide-in 0.35s ease; cursor:pointer;
}
@keyframes slide-in { from{transform:translateY(-16px);opacity:0} to{transform:translateY(0);opacity:1} }
#notif-prompt {
  background:#fff3cd; border:1px solid #ffc107; border-radius:10px;
  padding:12px 14px; margin:10px;
  display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:13px;
}
#editModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); justify-content:center; align-items:center; z-index:9999; }
</style>

</head>
<body>
<div id="notif-banner" onclick="this.style.display='none'">🔔 <span id="notif-text"></span></div>


<div class="header">
  🍴 Dashboard
  <span id="order-badge" style="display:none;background:white;color:red;border-radius:50%;padding:2px 7px;font-size:12px;margin-left:6px;vertical-align:middle;"></span>
</div>

<div class="container">


  <div class="card">
    <h3>Add Food</h3>
    <input id="fname"  placeholder="Food name">
    <input id="price"  placeholder="Price">
    <input id="img"    placeholder="Image URL">
    <button class="green" onclick="addFood()">Add Food</button>
  </div>

  <div class="card">
    <h3>Your Foods</h3>
    <input id="searchFood" placeholder="Search food..." onkeyup="filterFoods()">
    <div id="foodList" class="food-scroll"></div>
  </div>

  <div class="card">
    <h3>Your Orders <span id="order-badge2" style="background:red;color:white;border-radius:50%;padding:2px 8px;font-size:12px;display:none;margin-left:6px;"></span></h3>
    <div id="orders"></div>
  </div>

  <div class="card">
    <h3>Earnings</h3>
    <div class="earn-box"><div>Today: ₹<span id="todayEarn">0</span></div><button class="red" onclick="alert('Reset from Admin Panel.')">Reset</button></div>
    <div class="earn-box"><div>Total: ₹<span id="totalEarn">0</span></div><button class="red" onclick="alert('Reset from Admin Panel.')">Reset</button></div>
  </div>

</div>

<div class="bottom-nav">
  <div onclick="location.href='Profile.html'" style="cursor:pointer;font-size:14px;">👤 Profile</div>
</div>

<div id="editModal">
  <div style="background:white;padding:20px;border-radius:12px;width:90%;max-width:400px;">
    <h3>Edit Food</h3>
    <input id="editName" placeholder="Food Name">
    <input id="editPrice" placeholder="Price">
    <input id="editImage" placeholder="Image URL">
    <button class="green" onclick="saveFood()">Save</button>
    <button class="red"   onclick="closeEdit()">Cancel</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, where,
  onSnapshot, deleteDoc, doc, updateDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",
  authDomain:"food-delivery-app-97300.firebaseapp.com",
  projectId:"food-delivery-app-97300"
});
const db   = getFirestore(app);
const auth = getAuth(app);



onAuthStateChanged(auth, async (user) => {
  if (!user) { location.href = "login.html"; return; }

  const restaurantId  = user.uid;
  const restaurantRef = doc(db,"restaurants",restaurantId);

  onSnapshot(restaurantRef, snap => {
    if (!snap.exists()) return;
    const d = snap.data();
    document.getElementById("todayEarn").innerText = d.todayEarn || 0;
    document.getElementById("totalEarn").innerText = d.totalEarn || 0;
  });

  

  window.addFood = async () => {
    const name  = document.getElementById("fname").value.trim();
    const price = document.getElementById("price").value.trim();
    const image = document.getElementById("img").value.trim();
    if (!name || !price) { alert("Fill food name and price!"); return; }
    await addDoc(collection(db,"menu"),{ name, price:Number(price), image, restaurantId, enabled:true });
    document.getElementById("fname").value="";
    document.getElementById("price").value="";
    document.getElementById("img").value="";
  };

  let allFoods = [];
  onSnapshot(query(collection(db,"menu"),where("restaurantId","==",restaurantId)), snap => {
    allFoods = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderFoods(allFoods);
  });

  function renderFoods(list) {
    document.getElementById("foodList").innerHTML = list.map(f=>`
      <div class="food-item">
        <div class="food-left">
          <img class="food-img" src="${f.image||'https://via.placeholder.com/50'}" onerror="this.src='https://via.placeholder.com/50'">
          <div><b>${f.name}</b><br>₹${f.price}<br>
            <small style="color:${f.enabled?'green':'red'}">${f.enabled?'Available':'Unavailable'}</small>
          </div>
        </div>
        <div>
          <button class="${f.enabled?'orange':'green'}" onclick="toggleFood('${f.id}',${f.enabled})">${f.enabled?'Disable':'Enable'}</button>
          <button class="green" onclick="editFood('${f.id}','${f.name}',${f.price},'${f.image||''}')">Edit</button>
          <button class="red"   onclick="deleteFood('${f.id}')">Delete</button>
        </div>
      </div>`).join('');
  }

  window.deleteFood  = async id => { if(confirm("Delete?")) await deleteDoc(doc(db,"menu",id)); };
  window.toggleFood  = async (id,cur) => await updateDoc(doc(db,"menu",id),{enabled:!cur});
  window.filterFoods = () => {
    const t = document.getElementById("searchFood").value.toLowerCase();
    renderFoods(allFoods.filter(f=>f.name.toLowerCase().includes(t)));
  };

  let editingFoodId = "";
  window.editFood = (id,name,price,image) => {
    editingFoodId = id;
    document.getElementById("editName").value  = name;
    document.getElementById("editPrice").value = price;
    document.getElementById("editImage").value = image||"";
    document.getElementById("editModal").style.display = "flex";
  };
  window.closeEdit = () => document.getElementById("editModal").style.display = "none";
  window.saveFood  = async () => {
    await updateDoc(doc(db,"menu",editingFoodId),{
      name:  document.getElementById("editName").value,
      price: Number(document.getElementById("editPrice").value),
      image: document.getElementById("editImage").value
    });
    closeEdit();
    showBanner("✅ Food updated!","green");
  };

  // ══════════════════════════════════════════════
  // ORDERS LISTENER
  // ══════════════════════════════════════════════
  let knownOrders = new Set();

  onSnapshot(
    query(collection(db,"orders"),where("restaurantId","==",restaurantId)),
    snap => {
      let html = "";
      let count = 0;

      snap.forEach(d => {
        const o = d.data();
        if (o.status === "Rejected" || o.status === "Delivered") return;
        count++;

        if (!knownOrders.has(d.id) && knownOrders.size > 0) {
          const items = (o.items||[]).map(i=>`${i.name} x${i.qty}`).join(", ");
          showBanner(`🔔 New Order! ₹${o.total} from ${o.customerName||"Customer"}`,"green");
          playChime();
          if (Notification.permission === "granted") {
            new Notification("🍔 New Order!", {
              body: `₹${o.total} • ${items}`,
              icon: "/restaurant/icons/restaurant-192.png",
              tag:  "order-" + d.id,
              renotify: true,
              requireInteraction: true
            });
          }
        }
        knownOrders.add(d.id);

        const itemsHTML = (o.items||[]).map(i=>
          `<div style="font-size:13px;color:#555;">• ${i.name} × ${i.qty} — ₹${i.price*i.qty}</div>`
        ).join('');

        const sClass = {
          "Pending":"s-pending","Accepted":"s-accepted",
          "Ready":"s-ready","Out for Delivery":"s-out-for-delivery"
        }[o.status] || "s-pending";

        // BUTTONS
        // Pending  → [Accept] [Reject]
        // Accepted → [Mark Ready]  (reject gone)
        // Ready & beyond → no buttons needed
        let btns = "";
        if (o.status === "Pending") {
          btns = `
            <button class="green" onclick="acceptOrder('${d.id}')">✅ Accept</button>
            <button class="red"   onclick="rejectOrder('${d.id}')">❌ Reject</button>`;
        } else if (o.status === "Accepted") {
          btns = `<button class="blue" onclick="markReady('${d.id}')">🍽️ Mark Ready</button>`;
        }

        html += `
          <div class="order-box" id="order_${d.id}">
            <b>👤 ${o.customerName||"—"}</b>
            &nbsp;<span class="sbadge ${sClass}">${o.status}</span><br>
            📞 ${o.customerPhone||"—"}<br>
            📍 ${o.customerAddress||"—"}<br><br>
            ${itemsHTML}
            <br>
            <b>Food: ₹${o.subtotal||o.total}</b><br>
            <small>Delivery: ₹${o.deliveryFee||0} | Platform: ₹${o.platformFee||0}</small><br>
            <b style="font-size:16px;">Total: ₹${o.total}</b>
            ${o.deliveryBoyName?`<br><br>🛵 <b>${o.deliveryBoyName}</b> — ${o.deliveryBoyPhone||""}`:""}
            <br><br>${btns}
          </div>`;
      });

      document.getElementById("orders").innerHTML = html || "<p style='color:#999;'>No active orders</p>";
      const b1 = document.getElementById("order-badge");
      const b2 = document.getElementById("order-badge2");
      if (count > 0) { b1.innerText=count; b1.style.display="inline"; b2.innerText=count; b2.style.display="inline"; }
      else           { b1.style.display="none"; b2.style.display="none"; }
    }
  );

  // ══════════════════════════════════════════════
  // ACCEPT ORDER
  // Sets status = "Accepted", deliveryBoyId = ""
  // ALL delivery boys can see it, first to tap wins
  // ══════════════════════════════════════════════
  window.acceptOrder = async (orderId) => {
    try {
      const snap = await getDoc(doc(db,"orders",orderId));
      if (!snap.exists()) return;
      const order = snap.data();

      // ✅ KEY FIX: deliveryBoyId must be "" (empty string) so ALL riders see it
      await updateDoc(doc(db,"orders",orderId), {
        status:           "Accepted",
        deliveryBoyId:    "",    // ← empty = open to ALL delivery boys
        deliveryBoyName:  "",
        deliveryBoyPhone: ""
      });

      // Push notification to ALL delivery boys via Webpushr segment
      await pushToAllDeliveryBoys(order, orderId);
      showBanner("✅ Accepted! All delivery boys notified.","green");
    } catch(e) {
      console.error(e);
      alert("Error: " + e.message);
    }
  };

async function pushToAllDeliveryBoys(order, orderId) {
    try {
      await fetch("https://www.elurufoods.shop/api/emailDeliveryBoys", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          restaurantName: order.restaurantName,
          customerAddress: order.customerAddress,
          total: order.total
        })
      });
    } catch(e) {
      console.warn("Email notify failed (non-critical):", e);
    }
}

  window.markReady = async (orderId) => {
    await updateDoc(doc(db,"orders",orderId), { status:"Ready" });
    showBanner("🍽️ Marked Ready! Customer can see food is ready.","blue");
  };

  window.rejectOrder = async (orderId) => {
    if (!confirm("Reject this order?")) return;
    await updateDoc(doc(db,"orders",orderId), { status:"Rejected" });
    setTimeout(async () => {
      try { await deleteDoc(doc(db,"orders",orderId)); } catch(e){}
    }, 3000);
  };

  window.showBanner = (msg, color="green") => {
    const b = document.getElementById("notif-banner");
    const c = {green:"#28a745",orange:"#ff9800",red:"#dc3545",blue:"#007bff"};
    b.style.background = c[color]||"#28a745";
    document.getElementById("notif-text").innerText = msg;
    b.style.display = "block";
    clearTimeout(b._t);
    b._t = setTimeout(()=>b.style.display="none", 6000);
  };

  function playChime() {
    try {
      const ctx = new(window.AudioContext||window.webkitAudioContext)();
      [880,660,880].forEach((freq,i)=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value=freq; o.type="sine";
        g.gain.setValueAtTime(0.3, ctx.currentTime+i*0.18);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.18+0.16);
        o.start(ctx.currentTime+i*0.18);
        o.stop(ctx.currentTime+i*0.18+0.17);
      });
    } catch(e){}
  }

});
</script>



<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/restaurant/sw.js",{scope:"/restaurant/"})
    .then(r=>console.log("SW:",r.scope)).catch(e=>console.log("SW error:",e));
}
</script>

</body>
</html>
