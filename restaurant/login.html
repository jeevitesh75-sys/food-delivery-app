<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Restaurant Login</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<link rel="manifest" href="/restaurant/manifest.json">

<meta
name="theme-color"
content="#ff4d4d">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

background:
linear-gradient(
180deg,
#ff4d4d,
#ff884d
);

}

.card{

width:100%;

max-width:380px;

background:white;

padding:40px 30px;

border-radius:26px;

text-align:center;

box-shadow:
0 20px 50px
rgba(0,0,0,.18);

}

.icon{

width:110px;

height:110px;

margin:auto;

background:#fff4e8;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:50px;

margin-bottom:22px;

}

.title{

font-size:30px;

font-weight:bold;

color:#222;

}

.sub{

margin-top:12px;

font-size:15px;

line-height:26px;

color:#666;

}

.login-btn{

width:100%;

margin-top:35px;

padding:16px;

border:none;

border-radius:14px;

background:#ff4d4d;

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.2s;

}

.login-btn:active{

transform:scale(.98);

}

.footer{

margin-top:18px;

font-size:12px;

color:#999;

}

</style>

</head>

<body>

<div class="card">

<div class="icon">
🏪
</div>

<div class="title">

Restaurant Partner

</div>

<div class="sub">

Login to manage your restaurant

<br><br>

Orders • Menu • Earnings

</div>

<button
class="login-btn"
onclick="googleLogin()">

🔵 Continue with Google

</button>

<div class="footer">

Powered by Eluru Foods

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,

GoogleAuthProvider,

signInWithPopup

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

getFirestore,

doc,

getDoc

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={

apiKey:
"AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",

authDomain:
"food-delivery-app-97300.firebaseapp.com",

projectId:
"food-delivery-app-97300",

storageBucket:
"food-delivery-app-97300.firebasestorage.app",

messagingSenderId:
"12744604798",

appId:
"1:12744604798:web:4417d6d7f97b9b7218ec2f"

};

const app=
initializeApp(
firebaseConfig
);

const auth=
getAuth(
app
);
import {
setPersistence,
browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

await setPersistence(
auth,
browserLocalPersistence
);
const db=
getFirestore(
app
);

const provider=
new GoogleAuthProvider();
import {
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(
auth,
async(user)=>{

if(!user) return;

const snap =
await getDoc(
doc(
db,
"restaurants",
user.uid
)
);

if(
snap.exists()
){
location.href =
"Dashboard.html";
}else{
location.href =
"details.html";
}

});
window.googleLogin=
async()=>{

try{

const result=
await signInWithPopup(
auth,
provider
);

const user=
result.user;

localStorage.setItem(

"restaurantUser",

JSON.stringify({

uid:user.uid,

displayName:user.displayName,

email:user.email,

photoURL:user.photoURL

})

);

const ref=
doc(
db,
"restaurants",
user.uid
);

const snap=
await getDoc(
ref
);

if(
snap.exists()
){

location.href=
"Dashboard.html";

}
else{

location.href=
"details.html";

}

}
catch(err){

alert(
err.message
);

console.log(
err
);

}

};

</script>
<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register(
"/restaurant/sw.js",
{
scope:"/restaurant/"
});
}
</script>

</body>

</html>
