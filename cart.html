<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart · Eluru Foods</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#D4AF37">

<style>
/* ── PAGE ── */
body {
  padding-bottom: 380px;
  opacity: 0;
  animation: fade-in 0.55s ease 0.05s forwards;
}
@keyframes fade-in { to { opacity: 1; } }

/* ── LOADER ── */
#loader {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #080808;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}
#loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.gold-ring {
  width: 58px; height: 58px;
  border-radius: 50%;
  border: 2px solid rgba(212,175,55,0.15);
  border-top-color: #D4AF37;
  border-right-color: rgba(212,175,55,0.45);
  animation: spin 1.3s linear infinite;
  box-shadow: 0 0 22px rgba(212,175,55,0.2);
  position: relative;
}
.gold-ring::after {
  content: '金';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Shippori Mincho', serif;
  font-size: 20px; color: #D4AF37; opacity: 0.7;
  animation: spin 1.3s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader h2 {
  font-family: 'Shippori Mincho', serif;
  font-size: 16px; color: #D4AF37;
  letter-spacing: 0.3em; text-transform: uppercase;
  text-shadow: 0 0 18px rgba(212,175,55,0.35);
}

/* ── HEADER ── */
.header {
  background: rgba(8,8,8,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(212,175,55,0.18);
  color: #D4AF37;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
.header a {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(212,175,55,0.08);
  border: 1px solid rgba(212,175,55,0.22);
  display: flex; align-items: center; justify-content: center;
  color: #D4AF37; text-decoration: none; font-size: 16px;
  transition: 0.3s ease; flex-shrink: 0;
}
.header a:hover {
  background: rgba(212,175,55,0.15);
  border-color: rgba(212,175,55,0.5);
}
.header-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 19px; font-weight: 600;
  color: #D4AF37;
  text-shadow: 0 0 14px rgba(212,175,55,0.3);
}

/* ── SECTION LABEL ── */
.cart-section-head {
  padding: 16px 18px 6px;
  display: flex; align-items: center; gap: 12px;
}
.cart-section-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 14px; color: rgba(240,230,204,0.45);
  letter-spacing: 0.15em; text-transform: uppercase;
  white-space: nowrap;
}
.cart-section-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(212,175,55,0.2), transparent);
}

/* ── CART CARD ── */
.cart-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 14px;
  padding: 14px;
  background: rgba(20,20,20,0.68);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(212,175,55,0.17);
  border-radius: 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.45);
  gap: 12px;
  transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
  opacity: 0;
  animation: card-in 0.4s ease forwards;
  position: relative;
  overflow: hidden;
}
.cart-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.2), transparent);
}
.cart-card:hover {
  border-color: rgba(212,175,55,0.35);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(212,175,55,0.1);
  transform: translateY(-2px);
}
@keyframes card-in {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.food-left {
  display: flex; gap: 13px; align-items: center; flex: 1; min-width: 0;
}
.food-image {
  width: 80px; height: 80px;
  border-radius: 12px; object-fit: cover; flex-shrink: 0;
  border: 1px solid rgba(212,175,55,0.15);
  filter: brightness(0.88);
  transition: filter 0.3s ease, transform 0.3s ease;
}
.cart-card:hover .food-image {
  filter: brightness(1);
  transform: scale(1.04);
}
.food-name {
  font-family: 'Shippori Mincho', serif;
  font-size: 15px; font-weight: 600;
  color: #D4AF37; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.food-price {
  font-size: 13px; color: rgba(240,230,204,0.5);
  margin-bottom: 10px; font-family: 'Inter', sans-serif;
}
.food-line-total {
  font-size: 13px; font-weight: 600;
  color: rgba(240,230,204,0.75);
  font-family: 'Inter', sans-serif;
}

/* ── QTY BOX ── */
.quantity-box {
  display: flex; align-items: center; gap: 8px;
}
.quantity-box button {
  width: 32px; height: 32px;
  border: none; border-radius: 50%;
  background: linear-gradient(135deg, #A07D1C, #D4AF37);
  color: #080808;
  font-size: 17px; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: 0.25s ease;
  box-shadow: 0 2px 10px rgba(212,175,55,0.28);
  flex-shrink: 0; line-height: 1;
}
.quantity-box button:hover {
  transform: scale(1.14);
  box-shadow: 0 4px 16px rgba(212,175,55,0.48);
}
.quantity-box button:active { transform: scale(0.94); }
.qty-num {
  font-size: 15px; font-weight: 700;
  color: #F0E6CC; min-width: 22px;
  text-align: center; font-family: 'Inter', sans-serif;
}

/* ── EMPTY CART ── */
.empty-cart {
  text-align: center;
  padding: 80px 30px 40px;
  color: rgba(240,230,204,0.3);
}
.empty-cart .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.35; }
.empty-cart h3 {
  font-family: 'Shippori Mincho', serif;
  font-size: 20px; color: rgba(240,230,204,0.4); margin-bottom: 8px;
}
.empty-cart p { font-size: 13px; color: rgba(240,230,204,0.25); }
.empty-cart .empty-cta {
  display: inline-block; margin-top: 24px;
  padding: 12px 28px;
  background: linear-gradient(135deg, #A07D1C, #D4AF37);
  color: #080808; border-radius: 30px;
  font-weight: 700; font-size: 13px;
  font-family: 'Inter', sans-serif;
  text-decoration: none; letter-spacing: 0.06em;
  transition: 0.3s ease;
  box-shadow: 0 4px 18px rgba(212,175,55,0.35);
}
.empty-cart .empty-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,175,55,0.5); }

/* ── SUMMARY PANEL ── */
.summary {
  position: fixed;
  bottom: 210px;
  left: 0; right: 0;
  background: rgba(10,10,10,0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(212,175,55,0.18);
  padding: 14px 20px 10px;
  z-index: 150;
}
.summary-row {
  display: flex; justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 13px; color: rgba(240,230,204,0.55);
  font-family: 'Inter', sans-serif;
  border-bottom: 1px solid rgba(212,175,55,0.05);
}
.summary-row:last-child { border-bottom: none; }
.summary-row.total {
  color: #F0E6CC; font-size: 16px; font-weight: 700;
  padding-top: 9px; margin-top: 4px;
}
.summary-row.total span:last-child {
  color: #D4AF37;
  font-family: 'Shippori Mincho', serif;
  font-size: 18px;
}

/* ── CHECKOUT BUTTON ── */
.checkout-btn {
  position: fixed;
  bottom: 84px;
  left: 14px; right: 14px;
  background: linear-gradient(135deg, #A07D1C 0%, #D4AF37 50%, #F0C93A 100%);
  color: #080808;
  font-weight: 700; font-family: 'Inter', sans-serif;
  font-size: 15px; letter-spacing: 0.06em;
  border-radius: 16px;
  padding: 16px 22px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(212,175,55,0.4);
  z-index: 200;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  border: none;
}
.checkout-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(212,175,55,0.55);
}
.checkout-btn:active { transform: scale(0.98); }
.checkout-arrow {
  font-size: 18px;
  background: rgba(0,0,0,0.15);
  border-radius: 50%;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  left: 14px; right: 14px; bottom: 14px;
  border-radius: 22px;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border: 1px solid rgba(212,175,55,0.15);
  display: flex; justify-content: space-around;
  padding: 10px 0 12px;
  z-index: 300;
  box-shadow: 0 -4px 30px rgba(0,0,0,0.5);
}
.nav-item {
  text-align: center; font-size: 11px;
  color: rgba(240,230,204,0.45);
  text-decoration: none;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 4px 16px;
  border-radius: 10px;
  transition: 0.3s ease;
  font-family: 'Inter', sans-serif;
}
.nav-item .nav-icon { font-size: 19px; }
.nav-item:hover, .nav-item.active {
  color: #D4AF37;
}
.nav-item.active .nav-icon {
  filter: drop-shadow(0 0 5px rgba(212,175,55,0.5));
}
#cart-count {
  background: #D4AF37; color: #080808;
  font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px;
  display: none; font-family: 'Inter', sans-serif;
}
</style>
</head>

<body>

<!-- ── LOADER ── -->
<div id="loader">
  <div class="gold-ring"></div>
  <h2>ELURU FOODS</h2>
</div>

<!-- ── PARTICLES CANVAS ── -->
<canvas id="particles-canvas" style="position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.3;"></canvas>

<!-- ── HEADER ── -->
<div class="header" style="position:relative;z-index:1;">
  <a href="restaurant.html">←</a>
  <div class="header-title">🛒 Your Cart</div>
</div>

<!-- ── SECTION LABEL ── -->
<div class="cart-section-head" style="position:relative;z-index:1;">
  <div class="cart-section-title">Order Items</div>
  <div class="cart-section-line"></div>
</div>

<!-- ── CART ITEMS ── -->
<div class="cart-container" id="cart" style="position:relative;z-index:1;"></div>

<!-- ── SUMMARY ── -->
<div class="summary" id="summaryBox">
  <div class="summary-row">
    <span>Item Total</span>
    <span id="subtotal">₹0</span>
  </div>
  <div class="summary-row">
    <span>Delivery Fee</span>
    <span id="deliveryFee">₹30</span>
  </div>
  <div class="summary-row">
    <span>Platform Fee</span>
    <span id="platformFee">₹0</span>
  </div>
  <div class="summary-row total">
    <span>Total</span>
    <span id="total">₹0</span>
  </div>
</div>

<!-- ── CHECKOUT BUTTON ── -->
<button class="checkout-btn" id="checkoutBtn" onclick="goCheckout()">
  <span>Proceed to Checkout</span>
  <span class="checkout-arrow">→</span>
</button>

<!-- ── BOTTOM NAV ── -->
<div class="bottom-nav">
  <a href="home.html" class="nav-item">
    <span class="nav-icon">🏠</span>Home
  </a>
  <a href="cart.html" class="nav-item active">
    <span class="nav-icon">🛒</span>Cart
    <span id="cart-count"></span>
  </a>
  <a href="profile.html" class="nav-item">
    <span class="nav-icon">👤</span>Profile
  </a>
</div>

<!-- ══ ALL ORIGINAL FIREBASE LOGIC (UNTOUCHED) ══ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey:    "AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",
  authDomain:"food-delivery-app-97300.firebaseapp.com",
  projectId: "food-delivery-app-97300"
};
initializeApp(firebaseConfig);
const db   = getFirestore();
const auth = getAuth();

onAuthStateChanged(auth, async (user) => {
  if (!user) { location.href = "login.html"; return; }

  let platformFee = 3;
  let deliveryFee = 30;

  const settingsSnap = await getDoc(doc(db, "settings", "appConfig"));
  if (settingsSnap.exists()) {
    const s    = settingsSnap.data();
    platformFee = s.platformFee || 3;
    const distance = Number(localStorage.getItem("restaurantDistance")) || 0;
    if      (distance <= 3)  deliveryFee = s.fee0to3   || 30;
    else if (distance <= 7)  deliveryFee = s.fee3to7   || 50;
    else if (distance <= 10) deliveryFee = s.fee7to10  || 70;
    else                     deliveryFee = s.fee10plus || 100;
  }

  let cartItems = JSON.parse(localStorage.getItem("cart")) || [];
  let container = document.getElementById("cart");

  const subtotalEl  = document.getElementById("subtotal");
  const totalEl     = document.getElementById("total");
  const summaryBox  = document.getElementById("summaryBox");
  const checkoutBtn = document.getElementById("checkoutBtn");

  function updateCartCount() {
    const count = cartItems.reduce((s, i) => s + i.qty, 0);
    const badge = document.getElementById("cart-count");
    if (count > 0) { badge.innerText = count; badge.style.display = "inline-block"; }
    else           { badge.style.display = "none"; }
  }

  function getDeliveryFee(distance) {
    if (distance <= 3) return 30;
    if (distance <= 6) return 50;
    return 70;
  }

  function renderCart() {
    container.innerHTML = "";
    let subtotal = 0;

    if (cartItems.length === 0) {
      container.innerHTML = `
        <div class="empty-cart">
          <div class="empty-icon">🛒</div>
          <h3>Your cart is empty</h3>
          <p>Add something delicious to get started</p>
          <a href="home.html" class="empty-cta">✦ Browse Restaurants</a>
        </div>`;
      summaryBox.style.display  = "none";
      checkoutBtn.style.display = "none";
      updateCartCount();
      return;
    }

    summaryBox.style.display  = "block";
    checkoutBtn.style.display = "flex";

    cartItems.forEach((item, index) => {
      subtotal += item.price * item.qty;
      const lineTotal = item.price * item.qty;

      const div = document.createElement("div");
      div.className = "cart-card";
      div.style.animationDelay = `${index * 0.07}s`;

      div.innerHTML = `
        <div class="food-left">
          <img class="food-image" src="${item.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200&q=80'}" alt="${item.name}">
          <div style="min-width:0;">
            <div class="food-name">${item.name}</div>
            <div class="food-price">₹${item.price} each</div>
            <div class="quantity-box">
              <button onclick="decrease(${index})">−</button>
              <span class="qty-num">${item.qty}</span>
              <button onclick="increase(${index})">+</button>
            </div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div class="food-line-total">₹${lineTotal}</div>
        </div>`;

      container.appendChild(div);
    });

    document.getElementById("deliveryFee").innerText = "₹" + deliveryFee;
    document.getElementById("platformFee").innerText = "₹" + platformFee;
    subtotalEl.innerText = "₹" + subtotal;
    totalEl.innerText    = "₹" + (subtotal + deliveryFee + platformFee);
    updateCartCount();
  }

  window.increase = function (index) {
    cartItems[index].qty++;
    localStorage.setItem("cart", JSON.stringify(cartItems));
    renderCart();
  };

  window.decrease = function (index) {
    if (cartItems[index].qty > 1) { cartItems[index].qty--; }
    else                          { cartItems.splice(index, 1); }
    localStorage.setItem("cart", JSON.stringify(cartItems));
    renderCart();
  };

  window.goCheckout = function () {
    if (cartItems.length === 0) { alert("Cart empty ❌"); return; }

    const restaurantId = cartItems[0].restaurantId;
    const mixed = cartItems.some(i => i.restaurantId !== restaurantId);
    if (mixed) { alert("Only one restaurant allowed ❌"); return; }

    const subtotal = cartItems.reduce((s, i) => s + i.price * i.qty, 0);
    localStorage.setItem("checkoutData", JSON.stringify({
      items: cartItems, restaurantId, subtotal, deliveryFee, platformFee,
      total: subtotal + deliveryFee + platformFee
    }));
    window.location.href = "checkout.html";
  };

  renderCart();
});
</script>

<!-- ── GOLD PARTICLES ── -->
<script>
(function () {
  const canvas = document.getElementById('particles-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function P() { this.reset(); }
  P.prototype.reset = function () {
    this.x = Math.random()*W; this.y = Math.random()*H;
    this.r = 0.5 + Math.random()*1.2;
    this.vx = (Math.random()-0.5)*0.2; this.vy = -0.1 - Math.random()*0.2;
    this.life = 0; this.max = 180 + Math.random()*200;
    this.gold = Math.random() > 0.38;
  };
  function init() {
    resize();
    for (let i = 0; i < 48; i++) { const p = new P(); p.life = Math.random()*p.max; particles.push(p); }
    loop();
  }
  function loop() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.life++; if (p.life > p.max) p.reset();
      const a = Math.sin((p.life/p.max)*Math.PI)*0.5;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.gold ? `rgba(212,175,55,${a})` : `rgba(240,230,204,${a*0.3})`;
      ctx.fill(); p.x += p.vx; p.y += p.vy;
    });
    requestAnimationFrame(loop);
  }
  window.addEventListener('resize', resize);
  init();
})();
</script>
