<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff4d4d">
<style>
body {
  margin:0;
  background:#f5f5f5;
  font-family:Arial;
  padding-bottom:80px;
}

.header {
  background:#caa52e;
  padding:15px;
  color:white;
}

.section {
  background:white;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:5px;
  border:1px solid #ccc;
}

button {
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.green { background:#28a745; color:white; }
.gray { background:#ccc; }

.address {
  border:1px solid #ddd;
  padding:10px;
  margin:8px 0;
  border-radius:5px;
}

.active {
  background:#d4edda;
}

.logout {
  background:red;
  color:white;
  padding:12px;
  text-align:center;
  margin:20px;
  border-radius:8px;
  cursor:pointer;
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid #ccc;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h3 id="userName"></h3>
  <p id="userEmail"></p>
</div>

<!-- VIEW PROFILE -->
<div class="section" id="viewBox">
  <h3>Profile</h3>
  <p><b>Name:</b> <span id="vName"></span></p>
  <p><b>Email:</b> <span id="vEmail"></span></p>
  <p><b>Phone:</b> <span id="vPhone"></span></p>

  <button class="green" onclick="openEdit()">Edit Profile</button>
</div>

<!-- EDIT PROFILE -->
<div class="section" id="editBox" style="display:none;">
  <h3>Edit Profile</h3>

  <input id="editName" placeholder="Name">
  <input id="editPhone" placeholder="Phone Number">

  <button class="green" onclick="saveProfile()">Save</button>
  <button class="gray" onclick="closeEdit()">Cancel</button>
</div>

<!-- ORDERS -->
<div class="section">
  <h3>My Orders</h3>
  <div id="orders"></div>
</div>

<!-- ADDRESSES -->
<div class="section">
  <h3>Saved Addresses</h3>

  <div id="addressList"></div>

  <input type="text" id="newAddress" placeholder="Enter address">

  <button onclick="getLocation()">Use Live Location</button>
  <button onclick="addAddress()">Add Address</button>
</div>
<!-- CUSTOMER SUPPORT -->
<div class="section">
  <h3>Customer Care</h3>

  <button onclick="openFeedback()">
    📝 Feedback Form
  </button>

  <button onclick="contactSupport()">
    📞 Contact Support
  </button>
</div>
<!-- LOGOUT -->
<div class="logout" onclick="logout()">Logout</div>

<!-- NAV -->
<div class="bottom-nav">
  <a href="home.html">🏠<br>Home</a>
  <a href="cart.html">🛒<br>Cart</a>
  <a href="profile.html">👤<br>Profile</a>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",
  authDomain: "food-delivery-app-97300.firebaseapp.com",
  projectId: "food-delivery-app-97300"
});

const db = getFirestore(app);
const auth = getAuth(app);
onAuthStateChanged(auth, async(user) => {

  if(!user){
    location.href = "login.html";
    return;
  }

  // ALL EXISTING CODE HERE
  // USER


// HEADER
userName.innerText = user.displayName || "User";
userEmail.innerText = user.email;

// FIRESTORE
let userRef = doc(db, "users", user.uid);
let snap = await getDoc(userRef);
let data = snap.data() || {};
if(!data.addresses){
  data.addresses = [];
}

if(data.defaultAddress === undefined){
  data.defaultAddress = 0;
}
// LOAD PROFILE
vName.innerText = user.displayName || "User";
vEmail.innerText = user.email;
vPhone.innerText = data.phone || "-";

editName.value = user.displayName || "";
editPhone.value = data.phone || "";

// EDIT
window.openEdit = ()=>{
  viewBox.style.display="none";
  editBox.style.display="block";
};

window.closeEdit = ()=>{
  editBox.style.display="none";
  viewBox.style.display="block";
};

window.saveProfile = async ()=>{
  let name = editName.value.trim();
  let phone = editPhone.value.trim();

  if(!name || !phone){
    alert("Enter name and phone ❌");
    return;
  }

  await updateDoc(userRef,{
    name: name,
    phone: phone
  });

  user.displayName = name;
  localStorage.setItem("user", JSON.stringify(user));

  vName.innerText = name;
  vPhone.innerText = phone;
  userName.innerText = name;

  alert("Updated ✅");

  closeEdit();
};

// ADDRESSES
let addresses = data.addresses || [];
let currentLat = null;
let currentLng = null;
let defaultIndex = data.defaultAddress || 0;
function renderAddresses(){
  addressList.innerHTML="";

  addresses.forEach((addr,i)=>{

  if(!addr) return;
    let div = document.createElement("div");
    div.className = "address " + (i===defaultIndex ? "active":"");

    div.innerHTML = `
      ${addr.address}<br>
      <button onclick="setDefault(${i})">Use</button>
      <button onclick="editAddress(${i})">Edit</button>
      <button onclick="deleteAddress(${i})">Delete</button>
    `;

    addressList.appendChild(div);
  });
}

window.addAddress = async ()=>{

  let val = newAddress.value.trim();

  if(!val){
    return alert("Enter address");
  }

  addresses.push({
    address: val,
    lat: currentLat,
    lng: currentLng
  });

  await updateDoc(userRef,{
    addresses
  });

  newAddress.value = "";

  renderAddresses();
};

window.deleteAddress = async (i)=>{
  addresses.splice(i,1);
  await updateDoc(userRef,{addresses});
  renderAddresses();
};

window.editAddress = async (i)=>{

  let updated = prompt(
    "Edit address:",
    addresses[i].address
  );

  if(updated){

    addresses[i].address = updated;

    await updateDoc(userRef,{
      addresses
    });

    renderAddresses();
  }
};

window.setDefault = async (i)=>{

  defaultIndex = i;

  await updateDoc(userRef,{
    defaultAddress:i,
    address:addresses[i].address,
    lat:addresses[i].lat,
    lng:addresses[i].lng
  });

  renderAddresses();

  alert("Address selected ✅");
};

// LOCATION
window.getLocation = ()=>{
  navigator.geolocation.getCurrentPosition(async (pos)=>{
    let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

currentLat = lat;
currentLng = lon;

    let res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`
    );

    let data = await res.json();
    newAddress.value = data.display_name || "Address not found";

  }, ()=> alert("Permission denied"));
};

// ORDERS
let q = query(collection(db,"orders"), where("userId","==",user.uid));
let ordersSnap = await getDocs(q);

if(ordersSnap.empty){
  orders.innerHTML="No orders yet";
}else{
  ordersSnap.forEach(d=>{

  let o = d.data();

  // Hide delivered orders after 5 minutes
  if(
    o.status === "Delivered" &&
    o.deliveredAt &&
    (Date.now() - o.deliveredAt) > 300000
  ){
    return;
  }

  let div = document.createElement("div");
  div.className = "address";

  div.innerHTML = `
    Status: ${o.status}<br>
    Total: ₹${o.total}
  `;

  // If order still active → open tracking page
  if(o.status !== "Delivered"){

    div.style.cursor = "pointer";

    div.onclick = ()=>{
      localStorage.setItem(
        "trackingOrderId",
        d.id
      );

      window.location.href =
      "tracking.html";
    };

  }

  orders.appendChild(div);

});
}

// INIT
renderAddresses();
window.openFeedback = ()=>{
  window.open(
  "https://docs.google.com/forms/d/e/1FAIpQLSfQoy70FjiDd_CwUJArWp6RFHnrReimgu2uknDL64G7KlY-xg/viewform?usp=header",
  "_blank"
);
};

window.contactSupport = ()=>{
  window.open(
    "https://wa.me/9494837377",
    "_blank"
  );
};
// LOGOUT

window.logout = async ()=>{
  await signOut(auth);
  localStorage.clear();
  location.href = "login.html";
};

});

</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
</body>
</html>
