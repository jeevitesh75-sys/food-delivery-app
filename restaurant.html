/* FOOD CARD */
.food-card {
  display: flex;
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  align-items: center;
}

.food-image {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  
  object-fit: cover;
}

.food-info {
  flex: 1;
  margin-left: 10px;
}

.food-name {
  font-size: 16px;
  font-weight: bold;
}

.food-price {
  color: gray;
  margin: 5px 0;
}

/* 🔥 QUANTITY */
.qty-box {
  display: flex;
  align-items: center;
  gap: 8px;
}

.qty-box button {
  background: #ffcc00;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
}

/* 🔥 CART BAR */
.cart-bar {
  position: fixed;
  bottom: 60px;
  left: 0;
  width: 100%;
  background: green;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 16px;
  z-index: 999;
}

/* 🔥 NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid #ccc;
  z-index: 1000;
}

.nav-item {
  text-align: center;
  position: relative;
}

/* 🔥 CART BADGE */
#cart-count {
  position: absolute;
  top: -5px;
  right: 10px;
  background: red;
  color: white;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 10px;
  display: none;
}

/* PREVENT OVERLAP */
body {
  padding-bottom: 120px;
}

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,

  query,
  where,

  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
const app = initializeApp({
  apiKey: "AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",
  authDomain: "food-delivery-app-97300.firebaseapp.com",
  projectId: "food-delivery-app-97300"
});

const db = getFirestore(app);
const auth = getAuth(app);
let MENU_LIMIT = 30;

onAuthStateChanged(auth, async(user) => {

  if(!user){
    location.href = "login.html";
    return;
  }
let foodMarkup = 0;
  const settingsSnap =
await getDoc(
  doc(db,"settings","appConfig")
);

if(settingsSnap.exists()){
  foodMarkup =
  settingsSnap.data().foodMarkup || 0;
}

let restaurantId = localStorage.getItem("selectedRestaurant");

if(!restaurantId){
  alert("No restaurant selected ❌");
  window.location.href="home.html";
}

let container = document.getElementById("menuContainer");

// 🔥 GET CART
function getCart(){
  return JSON.parse(localStorage.getItem("cart")) || [];
}

// 🔥 UPDATE CART BADGE
function updateCartCount(){
  let cart = getCart();
  let count = cart.reduce((sum, i) => sum + i.qty, 0);

  let badge = document.getElementById("cart-count");

  if(count > 0){
    badge.innerText = count;
    badge.style.display = "inline-block";
  } else {
    badge.style.display = "none";
  }
}

// 🔥 CHANGE QTY
window.changeQty = function(
  name,
  restaurantPrice,
  finalPrice,
  image,
  delta
){

  let cart = getCart();

  let item = cart.find(i=>i.name===name);

  if(item){
    item.qty += delta;

    if(item.qty <= 0){
      cart = cart.filter(i=>i.name!==name);
    }
  } else if(delta === 1){
    cart.push({
  name,
  restaurantPrice,
  markup: Number(foodMarkup || 0),
  price: finalPrice,
  image,
  qty: 1,
  restaurantId
});
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  loadMenu(); // refresh UI
  updateCartCount();
};

// LOAD MENU

container.innerHTML = html;

updateCartCount();

}
