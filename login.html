<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Eluru Foods Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff4d4d">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(
180deg,
#ff4d4d,
#ff914d
);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;
}

.login-container{
width:100%;
max-width:380px;
}

.card{

background:white;

padding:35px;

border-radius:24px;

text-align:center;

box-shadow:
0 15px 45px
rgba(0,0,0,.15);

}

.logo{

width:100px;

height:100px;

margin:auto;

background:#fff2e5;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:46px;

margin-bottom:20px;

}

.title{

font-size:32px;

font-weight:bold;

color:#222;

}

.subtitle{

margin-top:12px;

color:#666;

line-height:26px;

font-size:15px;

}

.login-btn{

width:100%;

margin-top:32px;

padding:16px;

background:#4285F4;

color:white;

border:none;

border-radius:14px;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

.login-btn:active{

transform:scale(.98);

}

.bottom{

margin-top:18px;

color:#888;

font-size:13px;

}

</style>

</head>

<body>

<div class="login-container">

<div class="card">

<div class="logo">
🍔
</div>

<div class="title">
Eluru Foods
</div>

<div class="subtitle">

Order food from local restaurants

<br><br>

Fast • Easy • Local

</div>

<button
class="login-btn"
onclick="googleLogin()">

🔵 Sign in with Google

</button>

<div class="bottom">

Continue to access your account

</div>

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithPopup,
GoogleAuthProvider
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={

apiKey:
"AIzaSyD_AhACSdb6ddlmNWU3UNKxUSBj-0pSIA8",

authDomain:
"food-delivery-app-97300.firebaseapp.com",

projectId:
"food-delivery-app-97300"

};

const app=
initializeApp(firebaseConfig);

const auth=
getAuth(app);

const db=
getFirestore(app);

const provider=
new GoogleAuthProvider();

window.googleLogin=
async()=>{

try{

const result=
await signInWithPopup(
auth,
provider
);

const user=
result.user;

localStorage.setItem(
"user",
JSON.stringify(user)
);

const userRef=
doc(
db,
"users",
user.uid
);

const snap=
await getDoc(
userRef
);

if(
snap.exists()
){

const data=
snap.data();

if(
data.policyAccepted
){

if(
data.phone
&&
data.address
){

location.href=
"home.html";

}else{

location.href=
"details.html";

}

}else{

location.href=
"accept.html";

}

}
else{

await setDoc(
userRef,
{

name:
user.displayName,

email:
user.email,

photo:
user.photoURL,

createdAt:
new Date()

}

);

location.href=
"accept.html";

}

}catch(err){

alert(
err.message
);

}

};

</script>

<script>

if(
"serviceWorker"
in navigator
){

navigator
.serviceWorker
.register(
"/sw.js"
);

}

</script>

</body>
</html>
